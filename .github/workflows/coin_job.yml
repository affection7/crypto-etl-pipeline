name: Coin Price Update

on:
  push:
    branches: [main]
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  docker-build:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:latest

  run:
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull Docker image
        run: docker pull ghcr.io/${{ github.repository }}:latest

      - name: Run Docker container
        run: docker run --rm -e API_KEY="${{ secrets.API_KEY }}" -e DATABASE_URL="${{ secrets.DATABASE_URL }}" -e URL_GECKO="${{ secrets.URL_GECKO }}" -e URL_PAPRIKA="${{ secrets.URL_PAPRIKA }}" -e URL_COINLORE="${{ secrets.URL_COINLORE }}" ghcr.io/${{ github.repository }}:latest
